name: Update Recession Monitor

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run recession monitor
        run: |
          cd $GITHUB_WORKSPACE
          python scripts/recession_monitor.py
          echo "--- Files in docs/ after script ---"
          ls -la docs/

      - name: Commit and push
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ -A
          git status
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "📊 Update $(date +%Y-%m-%d)" && git push)
