name: Update Recession Monitor

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run recession monitor
        run: python scripts/recession_monitor.py

      - name: Run Harnett monitor
        run: python scripts/harnett_monitor.py

      - name: Run credit monitor
        run: python scripts/credit_monitor.py

      - name: Show generated files
        run: ls -la docs/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update data"
          git push
